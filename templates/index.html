<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flask API Playground</title>
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
      max-width: 820px;
      width: 100%;
      padding: 2rem;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    h1 {
      margin-top: 0;
      font-size: clamp(2.2rem, 4vw, 3rem);
    }
    p {
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.7;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 1.75rem 0;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 1rem 1.3rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #1a1a1a;
      background: #f9e547;
      transition: transform 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="text"] {
      flex: 1;
      min-width: 240px;
      border: none;
      border-radius: 999px;
      padding: 1rem 1.2rem;
      font-size: 1rem;
      outline: none;
    }
    .output {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 1.4rem;
      margin-top: 1.5rem;
      white-space: pre-wrap;
      font-family: Menlo, Monaco, Consolas, monospace;
      color: #f0f0f0;
      line-height: 1.5;
    }
    .note {
      margin: 0.5rem 0 0;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Flask API Playground</h1>
    <p>Use the buttons below to test the three API endpoints: <code>/api/home</code>, <code>/api/data</code>, and <code>/api/sum</code>.</p>

    <div class="button-grid">
      <button id="btnHome">Call /api/home</button>
      <button id="btnData">Call /api/data</button>
    </div>

    <div class="controls">
      <input id="sumInput" type="text" value="1, 2, 3.5, 4" aria-label="Numbers to sum" />
      <button id="btnSum">Call /api/sum</button>
    </div>
    <p class="note">Enter comma-separated numbers and click the button to calculate their sum.</p>

    <div class="output" id="output">Results will appear here.</div>
  </main>

  <script>
    const output = document.getElementById('output');
    const sumInput = document.getElementById('sumInput');

    async function showResult(response) {
      const text = await response.text();
      try {
        const json = JSON.parse(text);
        output.textContent = JSON.stringify(json, null, 2);
      } catch (error) {
        output.textContent = text;
      }
    }

    document.getElementById('btnHome').addEventListener('click', async () => {
      output.textContent = 'Loading...';
      const response = await fetch('/api/home');
      await showResult(response);
    });

    document.getElementById('btnData').addEventListener('click', async () => {
      output.textContent = 'Loading...';
      const response = await fetch('/api/data');
      await showResult(response);
    });

    document.getElementById('btnSum').addEventListener('click', async () => {
      const raw = sumInput.value.split(',').map((value) => value.trim());
      output.textContent = 'Loading...';
      const response = await fetch('/api/sum', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numbers: raw }),
      });
      await showResult(response);
    });
  </script>
</body>
</html>
